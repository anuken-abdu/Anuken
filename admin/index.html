<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления сайтом</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #2d2d2d; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        
        /* Экран входа */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        input { padding: 10px; border-radius: 5px; border: none; width: 300px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0051a2; }
        
        /* Редактор */
        #editor-screen { display: none; height: 100%; flex-direction: column; }
        #toolbar { background: #1a1a1a; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        #status { font-size: 14px; color: #aaa; }
        #code-area { flex-grow: 1; width: 100%; background: #1e1e1e; color: #d4d4d4; border: none; padding: 10px; font-family: monospace; font-size: 14px; resize: none; outline: none; white-space: pre; overflow: auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>🔐 Вход в админку</h2>
        <p style="color:#aaa; font-size: 13px; margin-bottom: 20px;">Введите ваш GitHub Personal Access Token</p>
        <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx...">
        <button onclick="login()">Войти и загрузить сайт</button>
    </div>

    <div id="editor-screen">
        <div id="toolbar">
            <span>📝 Редактор <b>index.html</b></span>
            <div>
                <span id="status"></span>
                <button onclick="saveChanges()" style="background: #28a745; margin-left: 10px;">Сохранить на сайт</button>
            </div>
        </div>
        <textarea id="code-area"></textarea>
    </div>

<script>
    // ================= НАСТРОЙКИ =================
    const USERNAME = "whoiam-777";   // Ваш логин GitHub
    const REPO = "Anuken";           // Название вашего репозитория
    const FILE_PATH = "index.html";  // Файл, который редактируем
    // =============================================

    let currentSha = ""; // Нужен для GitHub API, чтобы подтвердить сохранение
    let globalToken = "";

    // 1. Вход и загрузка
    async function login() {
        const token = document.getElementById('tokenInput').value.trim();
        if (!token) return alert("Введите токен!");

        globalToken = token;
        document.getElementById('login-screen').innerHTML = "<h3>Загрузка сайта с GitHub...</h3>";

        try {
            // Запрашиваем файл с GitHub
            const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FILE_PATH}`, {
                headers: { "Authorization": `token ${token}` }
            });

            if (!response.ok) throw new Error("Ошибка доступа. Проверьте токен или имя репозитория.");

            const data = await response.json();
            currentSha = data.sha; // Запоминаем версию файла

            // GitHub отдает контент в Base64, нужно раскодировать (учитывая кириллицу)
            const content = new TextDecoder().decode(Uint8Array.from(atob(data.content), c => c.charCodeAt(0)));

            // Показываем редактор
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('editor-screen').style.display = 'flex';
            document.getElementById('code-area').value = content;

        } catch (err) {
            alert(err.message);
            location.reload();
        }
    }

    // 2. Сохранение
    async function saveChanges() {
        const newContent = document.getElementById('code-area').value;
        const btn = document.querySelector('#toolbar button');
        const status = document.getElementById('status');

        status.innerText = "Сохранение...";
        btn.disabled = true;

        try {
            // Кодируем обратно в Base64 для GitHub (с поддержкой кириллицы)
            const encodedContent = btoa(new TextEncoder().encode(newContent).reduce((data, byte) => data + String.fromCharCode(byte), ''));

            const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FILE_PATH}`, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${globalToken}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Обновление через Админ-панель", // Комментарий к коммиту
                    content: encodedContent,
                    sha: currentSha // Обязательно передаем SHA старой версии
                })
            });

            if (!response.ok) throw new Error("Не удалось сохранить.");

            const data = await response.json();
            currentSha = data.content.sha; // Обновляем SHA для следующих сохранений
            
            status.innerText = "✅ Сохранено! Обновится через минуту.";
            setTimeout(() => status.innerText = "", 5000);

        } catch (err) {
            alert("Ошибка сохранения: " + err.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
