<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Добавить проект</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#020617] text-slate-300 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-[#0f172a] p-8 rounded-2xl border border-white/10 shadow-2xl">
        <h1 class="text-2xl font-bold text-white mb-6 text-center">Добавить проект 🚀</h1>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Название</label>
                <input type="text" id="title" class="w-full bg-[#020617] border border-white/10 rounded-lg p-3 text-white focus:border-indigo-500 outline-none transition" placeholder="Например: Барбершоп">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Описание</label>
                <textarea id="description" rows="3" class="w-full bg-[#020617] border border-white/10 rounded-lg p-3 text-white focus:border-indigo-500 outline-none transition" placeholder="Что было сделано..."></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Картинка (URL)</label>
                <input type="text" id="image" class="w-full bg-[#020617] border border-white/10 rounded-lg p-3 text-white focus:border-indigo-500 outline-none transition" placeholder="images/maverick.jpg">
                <p class="text-[10px] text-slate-500 mt-1">Имя файла из папки images или ссылка из интернета</p>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Ссылка на сайт</label>
                <input type="text" id="link" class="w-full bg-[#020617] border border-white/10 rounded-lg p-3 text-white focus:border-indigo-500 outline-none transition" placeholder="https://...">
            </div>

            <button onclick="addProject()" id="btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition mt-4">
                Опубликовать
            </button>
            
            <p id="status" class="text-center text-sm font-bold mt-4 hidden"></p>
        </div>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-indigo-400 hover:text-white transition">← Вернуться на сайт</a>
        </div>
    </div>

    <script>
        // 👇 Я ВПИСАЛ ТВОЙ URL, ТЕБЕ НУЖНО ВСТАВИТЬ ТОЛЬКО КЛЮЧ 👇
        const SUPABASE_URL = 'https://nstotcrjlolxrkvaipdj.supabase.co';
        
        // ВСТАВЬ СЮДА ДЛИННЫЙ КЛЮЧ "anon public" СО СКРИНШОТА
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zdG90Y3JqbG9seHJrdmFpcGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTM1NzgsImV4cCI6MjA4MzE2OTU3OH0.jOIA74QDDq-RIhJgfLSGzlFcTKRoyECoHFYQnpiPeS4'; 

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function addProject() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            
            // Данные из полей
            const title = document.getElementById('title').value;
            const desc = document.getElementById('description').value;
            const img = document.getElementById('image').value;
            const link = document.getElementById('link').value;

            // Проверка
            if (!title || !img) {
                alert("Заполни хотя бы название и картинку!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Отправка...";

            // Отправляем в базу
            const { data, error } = await supabase
                .from('projects')
                .insert([{ 
                    title: title, 
                    description: desc, 
                    image_url: img, 
                    project_link: link 
                }]);

            // Результат
            if (error) {
                console.error(error);
                status.innerText = "Ошибка: " + error.message;
                status.className = "text-center text-sm font-bold mt-4 text-red-500 block";
                btn.innerText = "Попробовать снова";
            } else {
                status.innerText = "✅ Проект успешно добавлен!";
                status.className = "text-center text-sm font-bold mt-4 text-green-500 block";
                btn.innerText = "Опубликовать еще";
                
                // Очистка формы
                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                document.getElementById('link').value = '';
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
