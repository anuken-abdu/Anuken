<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка | Anuken</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-gray-800 p-8 rounded-xl border border-gray-700">
        <h2 class="text-2xl font-bold mb-6 text-center">Добавить проект</h2>

        <div class="space-y-4">
            <input id="title" type="text" placeholder="Название" class="w-full bg-gray-900 border border-gray-700 rounded p-3 focus:border-blue-500 outline-none">
            <textarea id="desc" rows="2" placeholder="Описание" class="w-full bg-gray-900 border border-gray-700 rounded p-3 focus:border-blue-500 outline-none"></textarea>
            <input id="img" type="text" placeholder="Картинка (images/maverick.jpg)" class="w-full bg-gray-900 border border-gray-700 rounded p-3 focus:border-blue-500 outline-none">
            <input id="link" type="text" placeholder="Ссылка (https://...)" class="w-full bg-gray-900 border border-gray-700 rounded p-3 focus:border-blue-500 outline-none">

            <button onclick="sendData()" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded font-bold transition">Отправить</button>
            <p id="msg" class="text-center text-sm mt-4"></p>
        </div>
        
        <a href="index.html" class="block text-center mt-6 text-gray-500 hover:text-white text-sm">На главную</a>
    </div>

    <script>
        // ДАННЫЕ УЖЕ ВСТАВЛЕНЫ:
        const PROJECT_URL = 'https://nstotcrjlolxrkvaipdj.supabase.co'; 
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zdG90Y3JqbG9seHJrdmFpcGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTM1NzgsImV4cCI6MjA4MzE2OTU3OH0.jOIA74QDDq-RIhJgfLSGzlFcTKRoyECoHFYQnpiPeS4';

        const supabase = supabase.createClient(PROJECT_URL, ANON_KEY);

        async function sendData() {
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            
            const title = document.getElementById('title').value;
            const description = document.getElementById('desc').value;
            const image_url = document.getElementById('img').value;
            const project_link = document.getElementById('link').value;

            if(!title || !image_url) { alert('Нужно название и картинка!'); return; }

            btn.disabled = true;
            btn.innerText = "Загрузка...";

            const { error } = await supabase.from('projects').insert([{ title, description, image_url, project_link }]);

            if (error) {
                msg.innerText = "Ошибка: " + error.message;
                msg.className = "text-center text-sm mt-4 text-red-500";
            } else {
                msg.innerText = "✅ Готово! Проект в базе.";
                msg.className = "text-center text-sm mt-4 text-green-500";
                document.getElementById('title').value = '';
            }
            btn.disabled = false;
            btn.innerText = "Отправить";
        }
    </script>
</body>
</html>
